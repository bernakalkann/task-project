version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_project_db
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: '1234'
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: task_project_backend
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: '1234'
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: task_project_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
